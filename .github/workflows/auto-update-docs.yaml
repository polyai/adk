name: Auto-update docs

# Runs whenever a PR that touches source code or pyproject.toml is merged to main.
# The agent reads the diff, figures out which docs pages are stale, rewrites them,
# and opens a PR for human review.
#
# Required secret: ANTHROPIC_API_KEY
# The GITHUB_TOKEN secret is automatically available — no setup needed.

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pyproject.toml'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD and HEAD~1 for the diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Install dependencies
        run: pip install anthropic

      - name: Run docs update agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python docs/scripts/update_docs.py

      - name: Check for doc changes
        id: check
        run: |
          git diff --quiet docs/ && echo "changed=false" >> $GITHUB_OUTPUT \
                                 || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Open docs PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="docs/auto-update-${SHORT_SHA}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add docs/
          git commit -m "docs: auto-update from ${SHORT_SHA}"
          git push origin "${BRANCH}"

          PR_BODY=$(cat docs/scripts/.pr_summary 2>/dev/null \
                    || echo "Auto-generated docs update from merge ${SHORT_SHA}.")

          gh pr create \
            --title "docs: auto-update from ${SHORT_SHA}" \
            --body  "${PR_BODY}" \
            --base  main \
            --head  "${BRANCH}"
