name: Coverage Report

on:
  pull_request:
    paths:
      - "src/**"

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run coverage on PR branch
        run: |
          source .venv/bin/activate
          uv run pytest src/poly/tests/ --cov=poly --cov-report=json:coverage-pr.json -q

      - name: Run coverage on base branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          source .venv/bin/activate
          PR_SHA=$(git rev-parse HEAD)
          git checkout -- uv.lock
          git checkout "origin/$BASE_REF"
          uv pip install -e ".[dev]"
          uv run pytest src/poly/tests/ --cov=poly --cov-report=json:coverage-base.json -q || true
          git checkout -- uv.lock
          git checkout "$PR_SHA"

      - name: Generate coverage comment
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          source .venv/bin/activate
          python .github/scripts/coverage_comment.py \
            coverage-base.json \
            coverage-pr.json \
            "$BASE_REF" > coverage_comment.md

      - name: Minimize previous coverage comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComments = comments.data.filter(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('<!-- coverage-report -->')
            );

            for (const comment of botComments) {
              try {
                await github.graphql(`
                  mutation MinimizeComment($subjectId: ID!, $classifier: ReportedContentClassifiers!) {
                    minimizeComment(input: {subjectId: $subjectId, classifier: $classifier}) {
                      minimizedComment {
                        isMinimized
                      }
                    }
                  }
                `, {
                  subjectId: comment.node_id,
                  classifier: 'OUTDATED'
                });
              } catch (error) {
                console.log(`Could not minimize comment ${comment.id}: ${error.message}`);
              }
            }

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('coverage_comment.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
