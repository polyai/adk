name: Sync Experimental Config Schema

on:
  # schedule:
  #   # Run daily at 3 AM UTC (adjust timezone as needed)
  #   - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout local_agent_studio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.POLY_CONFIG_BOT_TOKEN }}
          ref: main
          fetch-depth: 0  # Fetch full history for branch operations

      - name: Configure Git
        run: |
          # Configure git user (once for all commits)
          git config user.name "Poly Config Bot"
          git config user.email "poly-config-bot@poly-ai.com"
      - name: Fetch schema from poly_core
        id: fetch-schema
        run: |
          # Get file metadata to extract SHA
          METADATA=$(curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.POLY_CONFIG_BOT_TOKEN }}" \
            https://api.github.com/repos/PolyAI-LDN/poly_core/contents/src/poly_platform/llemur/additional_features/schema.yaml?ref=master)

          # Extract SHA using jq if available, otherwise use grep
          if command -v jq &> /dev/null; then
            SCHEMA_SHA=$(echo "$METADATA" | jq -r '.sha')
          else
            SCHEMA_SHA=$(echo "$METADATA" | grep -o '"sha":"[^"]*' | head -1 | cut -d'"' -f4)
          fi

          # Fetch raw content
          curl -s -H "Accept: application/vnd.github.raw+json" \
            -H "Authorization: Bearer ${{ secrets.POLY_CONFIG_BOT_TOKEN }}" \
            -o /tmp/schema.yaml \
            https://api.github.com/repos/PolyAI-LDN/poly_core/contents/src/poly_platform/llemur/additional_features/schema.yaml?ref=master

          echo "schema_sha=$SCHEMA_SHA" >> $GITHUB_OUTPUT

      - name: Compare files
        id: compare
        run: |
          # Check if files are different
          if diff -q /tmp/schema.yaml src/poly/resources/experimental_config_schema.yaml > /dev/null 2>&1; then
            echo "files_match=true" >> $GITHUB_OUTPUT
            echo "No changes detected. Schema is up to date."
          else
            echo "files_match=false" >> $GITHUB_OUTPUT
            echo "Changes detected. Will commit to main."
          fi

      - name: Update file and commit to main
        if: steps.compare.outputs.files_match == 'false'
        run: |
          # Update the file
          cp /tmp/schema.yaml src/poly/resources/experimental_config_schema.yaml

          # Stage the changes
          git add src/poly/resources/experimental_config_schema.yaml

          # Commit the changes
          git commit -m "chore: sync experimental_config_schema.yaml from poly_core

          Synced from: PolyAI-LDN/poly_core@master
          Source SHA: ${{ steps.fetch-schema.outputs.schema_sha }}

          Automated sync via GitHub Actions workflow."

          # Configure remote URL with token for authentication
          git remote set-url origin https://poly-config-bot:${{ secrets.POLY_CONFIG_BOT_TOKEN }}@github.com/${{ github.repository }}.git

          # Push directly to main
          git push origin main
