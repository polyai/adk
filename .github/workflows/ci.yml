name: CI

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Configure GitHub credentials
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.GENAI_FUNCTIONS_APP_ID }}
        private-key: ${{ secrets.GENAI_FUNCTIONS_APP_PRIVATE_KEY }}
        owner: PolyAI-LDN

    - name: Configure git credentials for private repos
      env:
        GENAI_FUNCTIONS_APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config --global url."https://x-access-token:${GENAI_FUNCTIONS_APP_TOKEN}@github.com/".insteadOf "https://github.com/"
        git config --global credential.helper store
        echo "https://x-access-token:${GENAI_FUNCTIONS_APP_TOKEN}@github.com" > ~/.git-credentials

    - name: Create virtual environment
      run: |
        uv venv

    - name: Install dependencies
      run: |
        source .venv/bin/activate
        uv pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        ruff check .

    - name: Format check with ruff
      run: |
        source .venv/bin/activate
        ruff format --check .

    - name: Run tests
      run: |
        source .venv/bin/activate
        uv run pytest src/poly/tests/ -v