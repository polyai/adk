name: CI

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Validate PR title follows conventional commits
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        # Conventional commit types from CONTRIBUTING.md
        pattern='^(feat|fix|chore|docs|ci|build|perf|refactor|style|test)(\(.+\))?!?: .+'
        if [[ ! "$PR_TITLE" =~ $pattern ]]; then
          echo "::error::PR title does not follow conventional commits format."
          echo ""
          echo "Expected: <type>[optional scope][!]: <description>"
          echo "  Types: feat, fix, chore, docs, ci, build, perf, refactor, style, test"
          echo "  Examples:"
          echo "    feat: add poly export command"
          echo "    fix(cli): handle missing config file"
          echo "    feat!: redesign resource schema"
          echo ""
          echo "See CONTRIBUTING.md for details."
          exit 1
        fi
        echo "PR title is valid: $PR_TITLE"

  lint-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Create virtual environment
      run: |
        uv venv

    - name: Install dependencies
      run: |
        source .venv/bin/activate
        uv pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        ruff check .

    - name: Format check with ruff
      run: |
        source .venv/bin/activate
        ruff format --check .

    - name: Run tests
      run: |
        source .venv/bin/activate
        uv run pytest src/poly/tests/ -v