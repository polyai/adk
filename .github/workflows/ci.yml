name: CI

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Create virtual environment
      run: |
        uv venv

    - name: Install dependencies
      run: |
        source .venv/bin/activate
        uv pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        ruff check .

    - name: Format check with ruff
      run: |
        source .venv/bin/activate
        ruff format --check .

    - name: Run tests
      run: |
        source .venv/bin/activate
        uv run pytest src/poly/tests/ -v