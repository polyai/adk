name: CI

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Validate PR title follows conventional commits
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        # Conventional commit types from CONTRIBUTING.md
        pattern='^(feat|fix|chore|docs|ci|build|perf|refactor|style|test)(\(.+\))?!?: .+'
        if [[ ! "$PR_TITLE" =~ $pattern ]]; then
          echo "::error::PR title does not follow conventional commits format."
          echo ""
          echo "Expected: <type>[optional scope][!]: <description>"
          echo "  Types: feat, fix, chore, docs, ci, build, perf, refactor, style, test"
          echo "  Examples:"
          echo "    feat: add poly export command"
          echo "    fix(cli): handle missing config file"
          echo "    feat!: redesign resource schema"
          echo ""
          echo "See CONTRIBUTING.md for details."
          exit 1
        fi
        echo "PR title is valid: $PR_TITLE"

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      CI: true
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Create virtual environment
      run: uv venv

    - name: Install dependencies
      run: uv pip install -e ".[dev]"

    - name: Run tests
      run: uv run pytest src/poly/tests/ -v

    - name: Lint with ruff
      if: matrix.os == 'ubuntu-latest'
      run: uv run ruff check .

    - name: Format check with ruff
      if: matrix.os == 'ubuntu-latest'
      run: uv run ruff format --check .

    - name: Check license compliance
      if: matrix.os == 'ubuntu-latest'
      run: uv run licensecheck --zero

    - name: Check licenses.json is up to date
      if: matrix.os == 'ubuntu-latest'
      run: |
        uv run pip-licenses
        git diff --exit-code licenses.json

  lint-and-test:
    name: lint-and-test
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Verify all jobs passed
      run: |
        if [ "${{ needs.test.result }}" != "success" ]; then
          echo "test failed: ${{ needs.test.result }}"
          exit 1
        fi
        echo "All CI jobs passed"
