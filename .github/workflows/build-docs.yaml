name: Build Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/build-docs.yaml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Install ADK
        run: pip install -e ..

      - name: Install docs dependencies
        run: pip install -r requirements.txt

      - name: Copy changelog
        run: cp ../CHANGELOG.md docs/changelog.md 2>/dev/null || echo "No CHANGELOG.md found, skipping"

      - name: Build docs
        run: mkdocs build --strict