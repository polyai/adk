name: Question
description: Ask a question about usage or behavior
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Not sure how something works? Ask here. For general Agent Studio questions, contact your PolyAI representative.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant details — what you've tried, what docs you've checked, etc.
