repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version - match requirements-dev.txt (0.14.2)
    rev: v0.14.2
    hooks:
      # Run the linter (with --fix to auto-fix issues locally)
      - id: ruff-check
        args: [--fix]
      # Run the formatter (auto-fix formatting issues)
      - id: ruff-format